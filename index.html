<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coast Run GP</title>
<meta name="description" content="A retro pseudo-3D motorcycle road racing game. Eight courses, eight bikes, three lives.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
body{margin:0;background:#0d1018;color:#cfd3da;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
h1{font-size:18px;font-weight:600;margin:14px 0 10px;color:#e8eaf0;letter-spacing:0.5px;}
canvas{width:min(96vw,1020px);aspect-ratio:17/10;border-radius:12px;display:block;cursor:pointer;}
p.hint{font-size:13px;color:#8a8f99;margin:10px 0 14px;text-align:center;padding:0 12px;line-height:1.6;}
</style>
</head>
<body>
<h1>Coast Run GP</h1>
<canvas id="gp" width="680" height="400"></canvas>
<p class="hint">&larr; &rarr; steer / navigate &middot; &uarr; throttle &middot; &darr; brake &middot; enter confirm &middot; b back &middot; m sound on/off &middot; r reset career (on course select)</p>
<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script src="js/sprites.js"></script>
<script src="js/main.js"></script>
</body>
</html>
